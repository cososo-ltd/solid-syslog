<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="'Segoe Print', 'Bradley Hand', 'Patrick Hand', cursive">
  <!-- Worked combination: a lean edge sensor (SL1-shaped). Style kit: postit-defs.svg (defs inlined). -->
  <defs>
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.5"/>
    </filter>
    <filter id="postitShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrowUses" markerWidth="12" markerHeight="12" refX="8" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9" fill="none" stroke="#2b2b2b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowRealises" markerWidth="22" markerHeight="16" refX="15" refY="7.5" orient="auto">
      <path d="M2,2 Q10,0.5 15.5,7.5 Q9.5,14 2.5,12.5 Q4,7.5 2,2 Z" fill="#fbfbf5" stroke="#2b2b2b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
  </defs>

  <style>.node{cursor:pointer}.node:hover .card{stroke:#6fae74;stroke-width:3}.node:hover .facade{stroke:#b89a3c;stroke-width:3}</style>

  <rect width="960" height="600" fill="#fbfbf5"/>
  <text x="45" y="50" font-size="27" fill="#1a1f6e" font-weight="bold">A lean edge sensor</text>
  <text x="47" y="78" font-size="15" fill="#6a6a60" font-family="'Segoe UI', sans-serif">SL1-shaped — a well-formed, delivered record. Trusted network, one task, no audit-loss budget yet.</text>
  <line x1="45" y1="92" x2="915" y2="92" stroke="#3340a8" stroke-width="3" stroke-linecap="round" filter="url(#rough)"/>

  <g font-family="'Segoe UI', sans-serif" font-size="12" fill="#2b2b2b">
    <rect x="705" y="28" width="14" height="14" fill="#bfe3c0"/><text x="724" y="40">role</text>
    <rect x="775" y="28" width="14" height="14" fill="#cdd4f5"/><text x="794" y="40">chosen</text>
    <rect x="862" y="28" width="14" height="14" fill="#e8e8e2"/><text x="881" y="40">Null</text>
  </g>

  <!-- facade -->
  <a href="../../api/SolidSyslog_8h/" target="_top" class="node">
  <g filter="url(#postitShadow)"><rect class="facade" x="45" y="175" width="180" height="150" fill="#ffe7a3" transform="rotate(-2 135 250)"/></g>
  <g transform="rotate(-2 135 250)" fill="#3a3320">
    <text x="66" y="212" font-size="19" font-weight="bold">SolidSyslog</text>
    <text x="66" y="234" font-size="12" font-family="'Segoe UI', sans-serif">the handle you call</text>
    <line x1="66" y1="244" x2="205" y2="244" stroke="#b89a3c" stroke-width="1.4"/>
    <text x="66" y="266" font-size="13" font-family="'Segoe UI', sans-serif">· Log(message)</text>
    <text x="66" y="288" font-size="13" font-family="'Segoe UI', sans-serif">· Service()</text>
  </g>
  </a>

  <!-- Row 1: Buffer -> Passthrough -->
  <a href="../../api/structSolidSyslogBuffer/" target="_top" class="node">
  <g filter="url(#postitShadow)"><rect class="card" x="355" y="120" width="175" height="66" fill="#bfe3c0" transform="rotate(-1 442 153)"/></g>
  <g transform="rotate(-1 442 153)" fill="#21401f"><text x="372" y="150" font-size="16" font-weight="bold">Buffer</text><text x="372" y="171" font-size="11.5" font-family="'Segoe UI', sans-serif">Log → Service seam</text></g>
  </a>
  <g filter="url(#postitShadow)"><rect x="630" y="120" width="270" height="66" fill="#cdd4f5" transform="rotate(1 765 153)"/></g>
  <g transform="rotate(1 765 153)" fill="#15324f"><text x="648" y="150" font-size="15" font-weight="bold">Passthrough</text><text x="648" y="171" font-size="11.5" font-family="'Segoe UI', sans-serif">direct send · single-task</text></g>

  <!-- Row 2: Transport -> UDP -->
  <a href="../../api/structSolidSyslogSender/" target="_top" class="node">
  <g filter="url(#postitShadow)"><rect class="card" x="355" y="192" width="175" height="66" fill="#bfe3c0" transform="rotate(1 442 225)"/></g>
  <g transform="rotate(1 442 225)" fill="#21401f"><text x="372" y="222" font-size="16" font-weight="bold">Transport</text><text x="372" y="243" font-size="11.5" font-family="'Segoe UI', sans-serif">to the collector</text></g>
  </a>
  <g filter="url(#postitShadow)"><rect x="630" y="192" width="270" height="66" fill="#cdd4f5" transform="rotate(-1 765 225)"/></g>
  <g transform="rotate(-1 765 225)" fill="#15324f"><text x="648" y="222" font-size="15" font-weight="bold">UdpSender</text><text x="648" y="243" font-size="11.5" font-family="'Segoe UI', sans-serif">RFC 5426 (or plain TCP)</text></g>

  <!-- Row 3: Store -> Null -->
  <a href="../../api/structSolidSyslogStore/" target="_top" class="node">
  <g filter="url(#postitShadow)"><rect class="card" x="355" y="264" width="175" height="66" fill="#bfe3c0" transform="rotate(-1 442 297)"/></g>
  <g transform="rotate(-1 442 297)" fill="#21401f"><text x="372" y="294" font-size="16" font-weight="bold">Store</text><text x="372" y="315" font-size="11.5" font-family="'Segoe UI', sans-serif">store &amp; forward</text></g>
  </a>
  <g filter="url(#postitShadow)"><rect x="630" y="264" width="270" height="66" fill="#e8e8e2" transform="rotate(1 765 297)"/></g>
  <g transform="rotate(1 765 297)" fill="#7a7a70"><text x="648" y="294" font-size="15" font-weight="bold">Null</text><text x="648" y="315" font-size="11.5" font-family="'Segoe UI', sans-serif">no audit-loss budget yet</text></g>

  <!-- Row 4: SecurityPolicy -> Null -->
  <a href="../../api/structSolidSyslogSecurityPolicy/" target="_top" class="node">
  <g filter="url(#postitShadow)"><rect class="card" x="355" y="336" width="175" height="66" fill="#bfe3c0" transform="rotate(1 442 369)"/></g>
  <g transform="rotate(1 442 369)" fill="#21401f"><text x="372" y="366" font-size="15" font-weight="bold">SecurityPolicy</text><text x="372" y="387" font-size="11.5" font-family="'Segoe UI', sans-serif">at-rest protection</text></g>
  </a>
  <g filter="url(#postitShadow)"><rect x="630" y="336" width="270" height="66" fill="#e8e8e2" transform="rotate(-1 765 369)"/></g>
  <g transform="rotate(-1 765 369)" fill="#7a7a70"><text x="648" y="366" font-size="15" font-weight="bold">Null</text><text x="648" y="387" font-size="11.5" font-family="'Segoe UI', sans-serif">nothing at rest to protect</text></g>

  <!-- Row 5: Structured Data -> Null -->
  <a href="../../api/structSolidSyslogStructuredData/" target="_top" class="node">
  <g filter="url(#postitShadow)"><rect class="card" x="355" y="408" width="175" height="66" fill="#bfe3c0" transform="rotate(-1 442 441)"/></g>
  <g transform="rotate(-1 442 441)" fill="#21401f"><text x="372" y="438" font-size="15" font-weight="bold">Structured Data</text><text x="372" y="459" font-size="11.5" font-family="'Segoe UI', sans-serif">evidence</text></g>
  </a>
  <g filter="url(#postitShadow)"><rect x="630" y="408" width="270" height="66" fill="#e8e8e2" transform="rotate(1 765 441)"/></g>
  <g transform="rotate(1 765 441)" fill="#7a7a70"><text x="648" y="438" font-size="15" font-weight="bold">Null</text><text x="648" y="459" font-size="11.5" font-family="'Segoe UI', sans-serif">header timestamp is enough</text></g>

  <!-- uses arrows -->
  <g fill="none" stroke="#2b2b2b" stroke-width="2" filter="url(#rough)">
    <path d="M226 232 C 290 195, 320 160, 352 154" marker-end="url(#arrowUses)"/>
    <path d="M228 246 C 290 236, 320 228, 352 224" marker-end="url(#arrowUses)"/>
    <path d="M226 268 C 290 285, 320 294, 352 296" marker-end="url(#arrowUses)"/>
    <path d="M224 286 C 290 340, 315 362, 352 366" marker-end="url(#arrowUses)"/>
    <path d="M222 300 C 288 400, 312 434, 352 438" marker-end="url(#arrowUses)"/>
  </g>
  <text x="250" y="185" font-size="12" fill="#444" font-family="'Segoe UI', sans-serif" font-style="italic">uses</text>

  <!-- realises arrows -->
  <g fill="none" stroke="#2b2b2b" stroke-width="1.8" stroke-dasharray="6 5" filter="url(#rough)">
    <path d="M628 153 H 534" marker-end="url(#arrowRealises)"/>
    <path d="M628 225 H 534" marker-end="url(#arrowRealises)"/>
    <path d="M628 297 H 534" marker-end="url(#arrowRealises)"/>
    <path d="M628 369 H 534" marker-end="url(#arrowRealises)"/>
    <path d="M628 441 H 534" marker-end="url(#arrowRealises)"/>
  </g>

  <!-- caption -->
  <g filter="url(#postitShadow)"><rect x="45" y="500" width="855" height="72" fill="#fff7cf" transform="rotate(-0.4 472 536)"/></g>
  <g transform="rotate(-0.4 472 536)" fill="#4a441f" font-family="'Segoe UI', sans-serif">
    <text x="66" y="528" font-size="13.5" font-weight="bold">The least that emits a valid, timestamped RFC 5424 record.</text>
    <text x="66" y="550" font-size="12.5">Store, SecurityPolicy and Structured Data stay Null — the roles exist, you just don't wire them here.</text>
  </g>
</svg>
