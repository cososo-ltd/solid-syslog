name: Generate SBOM

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  sbom:
    # Generation + validation — shared by both triggers. Read-only; no secrets.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Read version from release-please manifest
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('.release-please-manifest.json'))['.'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute content-tree hash
        id: hash
        run: |
          # Content-tree hash: sha256 of sorted "<content-sha256>  <path>"
          # lines for every tracked file in the product scope at HEAD.
          # Reproducible byte-for-byte across git versions, archive formats,
          # locales, and tooling — only needs sha256sum + sort + either
          # `git ls-tree + git show` or an extracted working tree.
          #
          # Product scope per docs/security/sbom.md:
          #   - Core/ + Platform/ subdirectories (shipped library source)
          #   - Top-level CMakeLists.txt + CMakePresets.json (build contract
          #     an integrator invokes directly)
          #   - LICENSE.md (licence text we are legally bound by)
          #
          # Example/, Tests/, Bdd/, ci/, docs/, .devcontainer/, .github/,
          # sbom/, scripts/, and the other root-level docs/meta files are
          # reference / test-harness / CI / dev-infra / meta — out of scope.
          set -euo pipefail
          HASHLIST=$(mktemp)
          PATHS=$(mktemp)
          trap 'rm -f "$HASHLIST" "$PATHS"' EXIT
          git ls-tree -r --name-only HEAD -- \
              Core/ Platform/ \
              CMakeLists.txt CMakePresets.json LICENSE.md \
            | LC_ALL=C sort > "$PATHS"
          while IFS= read -r path; do
            # pipefail propagates a failing `git show` through the pipeline;
            # the explicit length check catches any degenerate empty-string
            # hash (sha256 of empty input is 64 hex chars, so this is
            # belt-and-braces against truncation elsewhere).
            content_hash=$(git show "HEAD:$path" | sha256sum | cut -d' ' -f1)
            if [ "${#content_hash}" -ne 64 ]; then
              echo "::error::unexpected hash length for $path: '$content_hash'" >&2
              exit 1
            fi
            printf '%s  %s\n' "$content_hash" "$path" >> "$HASHLIST"
          done < "$PATHS"
          HASH=$(sha256sum < "$HASHLIST" | cut -d' ' -f1)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Generate serial number
        id: serial
        run: |
          echo "uuid=$(cat /proc/sys/kernel/random/uuid)" >> "$GITHUB_OUTPUT"

      - name: Render SBOM
        env:
          VERSION: ${{ steps.version.outputs.version }}
          COMMIT_SHA: ${{ github.sha }}
          SOURCE_HASH: ${{ steps.hash.outputs.hash }}
          SERIAL_NUMBER: ${{ steps.serial.outputs.uuid }}
          TOOLS_VERSION: ${{ github.workflow_sha }}
        run: |
          export TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          envsubst '${VERSION} ${COMMIT_SHA} ${SOURCE_HASH} ${SERIAL_NUMBER} ${TIMESTAMP} ${TOOLS_VERSION}' \
            < sbom/sbom.cdx.json.template > sbom/sbom.cdx.json
          if grep -q '\${' sbom/sbom.cdx.json; then
            echo "::error::Unresolved placeholders in rendered SBOM"
            grep '\${' sbom/sbom.cdx.json
            exit 1
          fi
          python3 -c "import json; json.load(open('sbom/sbom.cdx.json'))"

      - name: Install cyclonedx-cli (v0.30.0, SHA256-pinned)
        run: |
          curl -sSLo /tmp/cyclonedx https://github.com/CycloneDX/cyclonedx-cli/releases/download/v0.30.0/cyclonedx-linux-x64
          echo "f89876326620f5fc78a9b27cc1af57d6ed13d019aab87490e1246a44a910babb  /tmp/cyclonedx" | sha256sum -c -
          chmod +x /tmp/cyclonedx

      - name: Validate SBOM
        run: |
          /tmp/cyclonedx validate --input-file sbom/sbom.cdx.json --input-format json --input-version v1_5 --fail-on-errors

      - name: Write source-tree-sha256.txt
        run: |
          cat > sbom/source-tree-sha256.txt <<EOF
          # SolidSyslog content-tree SHA-256
          # Scope: Core/ + Platform/ + top-level CMakeLists.txt, CMakePresets.json, LICENSE.md.
          # Commit: ${{ github.sha }}
          # Algorithm: sha256 of sorted "<content-sha256>  <path>" lines (LC_ALL=C sort).
          # Verification guide: docs/security/release-verification.md

          ${{ steps.hash.outputs.hash }}
          EOF
          cat sbom/source-tree-sha256.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx-${{ steps.version.outputs.version }}
          path: |
            sbom/sbom.cdx.json
            sbom/source-tree-sha256.txt
          if-no-files-found: error

  publish:
    # Release-only: keyless-sign the SBOM and source hash file, attach both
    # (plus signatures) to the GitHub Release as assets. Advisory-only on
    # initial rollout (per E19 guidance) — continue-on-error is set on the
    # sign + attach steps so a signing failure does not block the release.
    if: github.event_name == 'release'
    needs: sbom
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download SBOM workflow artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom-cyclonedx-${{ needs.sbom.outputs.version }}
          path: sbom/

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: 'v3.0.6'
        continue-on-error: true

      - name: Sign SBOM (keyless, GitHub OIDC)
        continue-on-error: true
        run: |
          cosign sign-blob --yes \
            --bundle sbom/sbom.cdx.json.bundle \
            sbom/sbom.cdx.json

      - name: Sign source-tree-sha256.txt (keyless, GitHub OIDC)
        continue-on-error: true
        run: |
          cosign sign-blob --yes \
            --bundle sbom/source-tree-sha256.txt.bundle \
            sbom/source-tree-sha256.txt

      - name: Attach assets to Release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # --repo is required here: the publish job doesn't check out the
          # source, so `gh` has no git config to infer the repo from.
          gh release upload "${{ github.event.release.tag_name }}" \
            sbom/sbom.cdx.json \
            sbom/sbom.cdx.json.bundle \
            sbom/source-tree-sha256.txt \
            sbom/source-tree-sha256.txt.bundle \
            --clobber \
            --repo "${{ github.repository }}"
