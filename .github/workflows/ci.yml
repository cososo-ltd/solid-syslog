name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-linux-gcc:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    container:
      image: ghcr.io/davidcozens/cpputest:sha-18f19e1
      options: --user root
    env:
      GIT_CONFIG_COUNT: 1
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: '*'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Configure
        run: cmake --preset debug

      - name: Build and test
        run: cmake --build --preset debug --target junit ExampleTests SolidSyslogExample SolidSyslogThreadedExample

      - name: Run example tests
        run: cd build/debug && ./Tests/Example/ExampleTests -ojunit -k ExampleTests

      - name: Test Report
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: Test Results (GCC)
          path: build/debug/cpputest_*.xml
          reporter: java-junit

      - name: Upload JUnit XML
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: junit-build-linux-gcc
          path: build/debug/cpputest_*.xml
          retention-days: 1

      - name: Upload example binaries
        uses: actions/upload-artifact@v4
        with:
          name: solid-syslog-examples
          path: |
            build/debug/Example/SolidSyslogExample
            build/debug/Example/SolidSyslogThreadedExample
          retention-days: 1
          compression-level: 0

  integration-linux-openssl:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    container:
      image: ghcr.io/davidcozens/cpputest:sha-18f19e1
      options: --user root
    env:
      GIT_CONFIG_COUNT: 1
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: '*'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Configure
        run: cmake --preset debug

      - name: Build integration tests
        run: cmake --build --preset debug --target OpenSslIntegrationTests

      - name: Run integration tests
        run: cd build/debug && ./Tests/OpenSslIntegration/OpenSslIntegrationTests -v -ojunit -k OpenSslIntegrationTests

      - name: Test Report
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: Test Results (OpenSSL Integration)
          path: build/debug/cpputest_*.xml
          reporter: java-junit

      - name: Upload JUnit XML
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: junit-integration-linux-openssl
          path: build/debug/cpputest_*.xml
          retention-days: 1

  build-linux-clang:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    container:
      image: ghcr.io/davidcozens/cpputest-clang:sha-0385cea
      options: --user root
    env:
      GIT_CONFIG_COUNT: 1
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: '*'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Configure
        run: cmake --preset clang-debug

      - name: Build and test
        run: cmake --build --preset clang-debug --target junit

      - name: Test Report
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: Test Results (Clang)
          path: build/clang-debug/cpputest_*.xml
          reporter: java-junit

      - name: Upload JUnit XML
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: junit-build-linux-clang
          path: build/clang-debug/cpputest_*.xml
          retention-days: 1

  sanitize-linux-gcc:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    container:
      image: ghcr.io/davidcozens/cpputest:sha-18f19e1
      options: --user root
    env:
      GIT_CONFIG_COUNT: 1
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: '*'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Configure
        run: cmake --preset sanitize

      - name: Build and test
        run: cmake --build --preset sanitize --target junit

      - name: Test Report
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: Test Results (Sanitize)
          path: build/sanitize/cpputest_*.xml
          reporter: java-junit

      - name: Upload JUnit XML
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: junit-sanitize-linux-gcc
          path: build/sanitize/cpputest_*.xml
          retention-days: 1

  coverage-linux-gcc:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pages: write
      id-token: write
    container:
      image: ghcr.io/davidcozens/cpputest:sha-18f19e1
      options: --user root
    env:
      GIT_CONFIG_COUNT: 1
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: '*'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Configure
        run: cmake --preset coverage

      - name: Build and generate coverage report
        run: cmake --build --preset coverage --target coverage

      - name: Post coverage summary
        run: |
          echo '## Coverage Summary' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          lcov --summary build/coverage/coverage.filtered.info --rc branch_coverage=1 2>&1 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Enforce coverage thresholds
        env:
          LINE_THRESHOLD: 90
          BRANCH_THRESHOLD: 90
        run: |
          SUMMARY=$(lcov --summary build/coverage/coverage.filtered.info --rc branch_coverage=1 2>&1)
          LINE_COV=$(echo "$SUMMARY" | sed -n 's/.*lines\.*: \([0-9.]*\)%.*/\1/p')
          BRANCH_COV=$(echo "$SUMMARY" | sed -n 's/.*branches\.*: \([0-9.]*\)%.*/\1/p')
          FAIL=0
          if [ -n "$LINE_COV" ]; then
            echo "Line coverage:   ${LINE_COV}% (threshold: ${LINE_THRESHOLD}%)"
            if awk "BEGIN{exit !($LINE_COV < $LINE_THRESHOLD)}"; then
              echo "FAIL: line coverage ${LINE_COV}% is below ${LINE_THRESHOLD}%"
              FAIL=1
            fi
          else
            echo "FAIL: could not determine line coverage"
            FAIL=1
          fi
          if [ -n "$BRANCH_COV" ]; then
            echo "Branch coverage: ${BRANCH_COV}% (threshold: ${BRANCH_THRESHOLD}%)"
            if awk "BEGIN{exit !($BRANCH_COV < $BRANCH_THRESHOLD)}"; then
              echo "FAIL: branch coverage ${BRANCH_COV}% is below ${BRANCH_THRESHOLD}%"
              FAIL=1
            fi
          else
            echo "Branch coverage: no branch data found (skipping threshold check)"
          fi
          exit $FAIL

      - name: Upload pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: build/coverage/coverage_report/

  deploy-coverage-pages:
    needs: coverage-linux-gcc
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  analyze-tidy:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/davidcozens/cpputest:sha-18f19e1
      options: --user root
    env:
      GIT_CONFIG_COUNT: 1
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: '*'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Configure
        run: cmake --preset tidy

      - name: Build with clang-tidy
        shell: bash
        run: set -o pipefail && cmake --build --preset tidy 2>&1 | tee build/tidy/clang-tidy-output.txt

      - name: Upload clang-tidy output
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: build/tidy/clang-tidy-output.txt
          retention-days: 1

  analyze-format:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/davidcozens/cpputest:sha-18f19e1
      options: --user root
    env:
      GIT_CONFIG_COUNT: 1
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: '*'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check clang-format
        run: |
          find Core/Interface Core/Source Tests Example -name '*.c' -o -name '*.cpp' -o -name '*.h' \
            | xargs clang-format --dry-run --Werror

  analyze-cppcheck:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/davidcozens/cpputest:sha-18f19e1
      options: --user root
    env:
      GIT_CONFIG_COUNT: 1
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: '*'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Configure
        run: cmake --preset cppcheck

      - name: Build with cppcheck
        run: cmake --build --preset cppcheck

      - name: Generate cppcheck XML report
        if: success() || failure()
        run: >
          cppcheck
          --enable=warning,style,performance,portability
          --suppress=missingIncludeSystem
          --inline-suppr
          --std=c11
          -ICore/Interface
          --xml --xml-version=2
          Core/Source/
          2> build/cppcheck/cppcheck-report.xml

      - name: Upload cppcheck report
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: build/cppcheck/cppcheck-report.xml
          retention-days: 1

  build-windows-msvc:
    runs-on: windows-latest
    permissions:
      contents: read
      checks: write
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Enable vcpkg binary cache
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install CppUTest
        run: |
          vcpkg install cpputest
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Configure
        run: cmake --preset msvc-debug

      - name: Build and test
        run: cmake --build --preset msvc-debug --target junit SolidSyslogWindowsExample

      - name: Test Report
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: Test Results (MSVC)
          path: build/msvc-debug/cpputest_*.xml
          reporter: java-junit

      - name: Upload JUnit XML
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: junit-build-windows-msvc
          path: build/msvc-debug/cpputest_*.xml
          retention-days: 1

      - name: Upload Windows example binary
        uses: actions/upload-artifact@v4
        with:
          name: solid-syslog-windows-example
          path: build/msvc-debug/Example/Debug/SolidSyslogExample.exe
          retention-days: 1
          compression-level: 0

  bdd-windows-otel:
    needs: build-windows-msvc
    runs-on: windows-2025
    permissions:
      contents: read
      checks: write
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/download-artifact@v4
        with:
          name: solid-syslog-windows-example
          path: build/msvc-debug/Example/Debug/

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Install behave
        run: pip install -r Bdd/requirements.txt

      - name: Install otelcol-contrib
        shell: pwsh
        run: ./Bdd/otel/Install-OtelCollector.ps1

      - name: Prepare BDD directories
        run: mkdir -p Bdd/output Bdd/junit

      - name: Start OTel Collector
        # Use bash `&` backgrounding (what works locally) rather than pwsh
        # Start-Process — the latter launched silently on windows-2025 with
        # empty redirect files and no UDP bind, suggesting the child was
        # either killed with the parent console or never actually executed.
        run: |
          nohup ./Bdd/otel/bin/otelcol-contrib.exe \
            --config=Bdd/otel/config.yaml \
            > Bdd/output/otelcol.out 2> Bdd/output/otelcol.err &
          echo "otelcol backgrounded with PID $!"

      - name: Wait for oracle to bind UDP 5514
        shell: pwsh
        run: |
          $deadline = (Get-Date).AddSeconds(30)
          while ((Get-Date) -lt $deadline) {
              if (Get-NetUDPEndpoint -LocalPort 5514 -ErrorAction SilentlyContinue) {
                  Write-Host "otelcol is listening on UDP 5514"
                  exit 0
              }
              Start-Sleep -Milliseconds 500
          }
          Write-Host "otelcol did not bind UDP 5514 within 30 seconds"
          Write-Host "--- tasklist otelcol-contrib ---"
          tasklist /FI "IMAGENAME eq otelcol-contrib.exe"
          Write-Host "--- UDP endpoints (top 20) ---"
          Get-NetUDPEndpoint | Select-Object -First 20 | Format-Table -AutoSize
          Write-Host "--- Bdd/output contents ---"
          Get-ChildItem Bdd/output -ErrorAction SilentlyContinue | Format-Table
          Write-Host "--- otelcol.out ---"
          Get-Content Bdd/output/otelcol.out -ErrorAction SilentlyContinue
          Write-Host "--- otelcol.err ---"
          Get-Content Bdd/output/otelcol.err -ErrorAction SilentlyContinue
          exit 1

      - name: Run BDD tests
        env:
          EXAMPLE_BINARY: build/msvc-debug/Example/Debug/SolidSyslogExample.exe
          RECEIVED_LOG: Bdd/output/received.jsonl
          ORACLE_FORMAT: otel-jsonl
        run: >
          behave --junit --junit-directory Bdd/junit
          --tags='not @wip and not @windows_wip and not @buffered'
          Bdd/features/

      - name: BDD Test Report (Windows)
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: Test Results (BDD Windows)
          path: Bdd/junit/TESTS-*.xml
          reporter: java-junit

      - name: Upload JUnit XML
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: junit-bdd-windows-otel
          path: Bdd/junit/TESTS-*.xml
          retention-days: 1

      - name: OTel collector logs on failure
        if: failure()
        run: |
          echo "--- otelcol.out ---"
          cat Bdd/output/otelcol.out || true
          echo "--- otelcol.err ---"
          cat Bdd/output/otelcol.err || true

  bdd-linux-syslog-ng:
    needs: build-linux-gcc
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/download-artifact@v4
        with:
          name: solid-syslog-examples
          path: build/debug/Example/

      - name: Make example binaries executable
        run: chmod +x build/debug/Example/SolidSyslogExample build/debug/Example/SolidSyslogThreadedExample

      - name: Prepare BDD output directory
        run: mkdir -p Bdd/junit && chmod 777 Bdd/junit

      - name: Run BDD tests
        run: >
          docker compose -f ci/docker-compose.bdd.yml
          up --build --abort-on-container-exit --exit-code-from behave

      - name: BDD Test Report
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: Test Results (BDD)
          path: Bdd/junit/TESTS-*.xml
          reporter: java-junit

      - name: Upload JUnit XML
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: junit-bdd-linux-syslog-ng
          path: Bdd/junit/TESTS-*.xml
          retention-days: 1

      - name: Compose logs on failure
        if: failure()
        run: docker compose -f ci/docker-compose.bdd.yml logs --no-color

  summary:
    if: always() && github.event_name == 'pull_request'
    needs: [build-linux-gcc, build-linux-clang, sanitize-linux-gcc, coverage-linux-gcc, analyze-tidy, analyze-cppcheck, analyze-format, bdd-linux-syslog-ng, build-windows-msvc, bdd-windows-otel, integration-linux-openssl]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download JUnit artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: junit-*
          path: quality-reports/

      - name: Download clang-tidy report
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: clang-tidy-report
          path: quality-reports/

      - name: Download cppcheck report
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: cppcheck-report
          path: quality-reports/
      - name: Quality Monitor
        uses: uhafner/quality-monitor@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}
          checks-name: Quality Summary
          config: >
            {
              "tests": {
                "name": "Tests",
                "tools": [
                  {
                    "id": "junit",
                    "name": "build-linux-gcc",
                    "pattern": "**/junit-build-linux-gcc/cpputest_*.xml"
                  },
                  {
                    "id": "junit",
                    "name": "build-linux-clang",
                    "pattern": "**/junit-build-linux-clang/cpputest_*.xml"
                  },
                  {
                    "id": "junit",
                    "name": "sanitize-linux-gcc",
                    "pattern": "**/junit-sanitize-linux-gcc/cpputest_*.xml"
                  },
                  {
                    "id": "junit",
                    "name": "integration-linux-openssl",
                    "pattern": "**/junit-integration-linux-openssl/cpputest_*.xml"
                  },
                  {
                    "id": "junit",
                    "name": "bdd-linux-syslog-ng",
                    "pattern": "**/junit-bdd-linux-syslog-ng/TESTS-*.xml"
                  },
                  {
                    "id": "junit",
                    "name": "bdd-windows-otel",
                    "pattern": "**/junit-bdd-windows-otel/TESTS-*.xml"
                  },
                  {
                    "id": "junit",
                    "name": "build-windows-msvc",
                    "pattern": "**/junit-build-windows-msvc/cpputest_*.xml"
                  }
                ]
              },
              "analysis": [
                {
                  "name": "analyze-tidy",
                  "id": "analyze-tidy",
                  "tools": [
                    {
                      "id": "clang-tidy",
                      "pattern": "**/clang-tidy-output.txt"
                    }
                  ]
                },
                {
                  "name": "analyze-cppcheck",
                  "id": "analyze-cppcheck",
                  "tools": [
                    {
                      "id": "cppcheck",
                      "pattern": "**/cppcheck-report.xml"
                    }
                  ]
                }
              ]
            }
