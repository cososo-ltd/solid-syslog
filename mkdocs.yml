# Documentation site build. The toolchain (Doxygen + MkDocs + Material + mkdoxy)
# ships as the ghcr.io/cososo-ltd/mkdocs-mkdoxy image — see docs/containers.md.
# The API reference under api/ is generated from Core/Interface/*.h by mkdoxy at
# build time and is git-ignored.
site_name: SolidSyslog
site_description: Structured syslog for embedded and industrial systems
site_url: https://cososo-ltd.github.io/solid-syslog/
repo_url: https://github.com/cososo-ltd/solid-syslog
repo_name: cososo-ltd/solid-syslog
edit_uri: edit/main/docs/
copyright: © Cozens Software Solutions Limited

extra_css:
  - assets/stylesheets/brand.css

extra:
  # The corporate logo and site title link here (cososo.co.uk homepage).
  homepage: https://www.cososo.co.uk

theme:
  name: material
  custom_dir: overrides
  # Header: corporate CoSoSo logo (→ homepage). Favicon: the SolidSyslog cube —
  # the browser tab represents the product, so it carries the product mark.
  logo: assets/images/cososo-logo.svg
  favicon: assets/images/solidsyslog-cube.svg
  # Match cososo.co.uk: Open Sans body, Montserrat headings (headings set in
  # assets/stylesheets/brand.css). The site accent #3e2199 is set there too.
  font:
    text: Open Sans
  palette:
    # cososo.co.uk is white/light only, so the docs are light only too — one
    # clean scheme, no dark toggle, so it always matches the website. primary:
    # white gives a white header with dark text and correctly styled search/icons.
    - scheme: default
      primary: white
      accent: deep purple
  features:
    # Top-level sections become a horizontal nav bar (closer to the website's
    # menu than the mobile hamburger); sub-pages stay in the left sidebar.
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - toc.follow
    - search.suggest

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      # GitHub-compatible slug function so in-page anchors match the ones the
      # same Markdown produces on GitHub (keeps cross-doc #anchors resolving).
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true

# TEMPORARY, tracked trade-off (docs overhaul Phase 6 follow-up):
#   not_found  — many docs link to repo source (../Core/…, ../Platform/…,
#                ../SECURITY.md), valid on GitHub but outside the site's docs
#                tree. Downgraded until those links are converted to canonical
#                GitHub URLs, after which this returns to `warn` (fatal).
#   anchors    — the mkdoxy-generated API pages emit a few internal anchors
#                (e.g. #enum-@0) that fail anchor validation; kept at info so
#                mkdoxy output does not fail the strict build.
# Everything else keeps its default: nav typos (validation.nav.*) and
# unrecognized links still fail a strict build.
validation:
  links:
    not_found: info
    anchors: info

plugins:
  - search
  # Renders GitHub alert blocks ( > [!NOTE] / [!WARNING] ) as Material
  # admonitions, so the same source renders natively on GitHub and in the site.
  - gh-admonitions
  - mkdoxy:
      projects:
        api:
          src-dirs: Core/Interface
          full-doc: true
          doxy-cfg:
            FILE_PATTERNS: "*.h"
            RECURSIVE: true
            EXTRACT_ALL: true
            OPTIMIZE_OUTPUT_FOR_C: true

nav:
  - Home: README.md
  - Overview:
      - Compliance in one page: overview.md
  - Adopt:
      - Getting started: getting-started.md
      - Components by Security Level: security-levels.md
      - Structured data: structured-data.md
      - Error handling: error-severity.md
      - Integrating lwIP: integrating-lwip.md
      - Integrating Mbed TLS: integrating-mbedtls.md
      - Integrating FreeRTOS-Plus-FAT: integrating-plusfat.md
  - Port a new platform:
      - Porting guide: porting.md
  - Compliance:
      - IEC 62443 guide: iec62443.md
      - RFC matrix: rfc-compliance.md
      - Threat model: security/threat-model.md
      - At-rest cryptography: security/at-rest-cryptography.md
      - SBOM: security/sbom.md
      - Vulnerability triage: security/triage-runbook.md
      - Release verification: security/release-verification.md
  - API reference:
      - Overview: api/links.md
      - Headers: api/files.md
      - Data structures: api/annotated.md
  - Maintaining:
      - Building & testing: builds.md
      - Local checks: local-checks.md
      - BDD testing: bdd.md
      - CI pipeline: ci.md
      - Container images: containers.md
      - Naming conventions: NAMING.md
      - MISRA deviations: misra-deviations.md
      - Release process: release-process.md
