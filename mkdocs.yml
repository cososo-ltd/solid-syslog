# Documentation site build. The toolchain (Doxygen + MkDocs + Material + mkdoxy)
# ships as the ghcr.io/cososo-ltd/mkdocs-mkdoxy image — see docs/containers.md.
# The API reference under api/ is generated from Core/Interface/*.h by mkdoxy at
# build time and is git-ignored.
site_name: SolidSyslog
site_description: Structured syslog for embedded and industrial systems
site_url: https://docs.cososo.co.uk/solid-syslog/
repo_url: https://github.com/cososo-ltd/solid-syslog
repo_name: cososo-ltd/solid-syslog
edit_uri: edit/main/docs/
copyright: © Cozens Software Solutions Limited

extra_css:
  - assets/stylesheets/brand.css

extra_javascript:
  # Shrinks the header logo on scroll (1.0 -> 0.755) to match cososo.co.uk.
  - javascripts/logo-scroll.js

extra:
  # The corporate logo and site title link here (cososo.co.uk homepage).
  homepage: https://www.cososo.co.uk

theme:
  name: material
  custom_dir: overrides
  # Header: corporate CoSoSo logo (→ homepage). Favicon: the SolidSyslog cube —
  # the browser tab represents the product, so it carries the product mark.
  logo: assets/images/cososo-logo.svg
  favicon: assets/images/solidsyslog-cube.svg
  # Match cososo.co.uk: Open Sans body, Montserrat headings (headings set in
  # assets/stylesheets/brand.css). The site accent #3e2199 is set there too.
  font:
    text: Open Sans
  palette:
    # cososo.co.uk is white/light only, so the docs are light only too — one
    # clean scheme, no dark toggle, so it always matches the website. primary:
    # white gives a white header with dark text and correctly styled search/icons.
    - scheme: default
      primary: white
      accent: deep purple
  features:
    # Top-level sections become a horizontal nav bar (closer to the website's
    # menu than the mobile hamburger); sub-pages stay in the left sidebar.
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - toc.follow
    - search.suggest

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      # GitHub-compatible slug function so in-page anchors match the ones the
      # same Markdown produces on GitHub (keeps cross-doc #anchors resolving).
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true

# Build-time hook: repo-source links (../Core/…, ../Platform/…, ../SECURITY.md)
# stay relative in the Markdown so they resolve on GitHub, in a clone, in a
# fork, and in the IDE. hooks/source_links.py rewrites any link that resolves
# outside docs/ to a canonical {repo_url}/blob|tree/{ref}/… URL at build time,
# before MkDocs validates links. Pin the ref per build with SOLIDSYSLOG_DOCS_REF
# (a release tag or commit SHA); it defaults to main.
hooks:
  - hooks/source_links.py
  # Injects post-it "realised by" relationship diagrams at the top of selected
  # generated API pages (experiment — see hooks/relationship_diagrams.py).
  - hooks/relationship_diagrams.py
  # Hides the one-entry table of contents on the generated Functions / Macros
  # indexes, whose letter buckets collapse under the common SolidSyslog prefix.
  - hooks/api_index_toc.py

# not_found — enforced (fatal under --strict): the hook above resolves every
#             in-repo source link, so a genuinely broken link fails the build.
# anchors   — the mkdoxy-generated API pages emit a few internal anchors
#             (e.g. #enum-@0) that fail anchor validation; kept at info so
#             mkdoxy output does not fail the strict build.
# Everything else keeps its default: nav typos (validation.nav.*) and
# unrecognized links still fail a strict build.
validation:
  links:
    not_found: warn
    anchors: info

plugins:
  - search
  # Renders GitHub alert blocks ( > [!NOTE] / [!WARNING] ) as Material
  # admonitions, so the same source renders natively on GitHub and in the site.
  - gh-admonitions
  - mkdoxy:
      projects:
        api:
          src-dirs: "Core/Interface Platform/Atomics/Interface Platform/FatFs/Interface Platform/FreeRtos/Interface Platform/LwipRaw/Interface Platform/MbedTls/Interface Platform/OpenSsl/Interface Platform/PlusFat/Interface Platform/PlusTcp/Interface Platform/Posix/Interface Platform/Windows/Interface"
          full-doc: true
          doxy-cfg:
            FILE_PATTERNS: "*.h"
            RECURSIVE: true
            EXTRACT_ALL: true
            OPTIMIZE_OUTPUT_FOR_C: true
            # First sentence of each /** */ block becomes the API-index brief.
            JAVADOC_AUTOBRIEF: true
            # Custom command: @optional tags a config member the caller may leave
            # NULL. Doubles as the machine-readable marker the relationship-diagram
            # hook reads to draw a 0.. lower bound (see hooks/relationship_data.py).
            ALIASES: '"optional=**Optional:** "'
            # Expand the C-linkage guard macros to nothing so Doxygen sees plain
            # file-scope C declarations. Without this the unexpanded EXTERN_C_BEGIN
            # token gets glued onto the first declaration in each header (e.g.
            # SolidSyslogSsize's type rendered as "EXTERN_C_BEGIN typedef intptr_t").
            # EXPAND_ONLY_PREDEF keeps every other macro (the SOLIDSYSLOG_* constants)
            # documented by name rather than expanded to its value.
            MACRO_EXPANSION: true
            EXPAND_ONLY_PREDEF: true
            PREDEFINED: "EXTERN_C_BEGIN= EXTERN_C_END="
            # The guards are internal C-linkage plumbing from Core/Interface/ExternC.h,
            # not integrator-facing API. PREDEFINED above only stops them corrupting the
            # declarations; this keeps them out of the public macro index as well.
            EXCLUDE_SYMBOLS: "EXTERN_C_*"

nav:
  - Home: README.md
  - Overview:
      - Compliance in one page: overview.md
  - Adopt:
      - Getting started: getting-started.md
      - Reference designs: reference-designs.md
      - Components by Security Level: security-levels.md
      - Structured data: structured-data.md
      - Error handling: error-severity.md
      - Integrating lwIP: integrating-lwip.md
      - Integrating Mbed TLS: integrating-mbedtls.md
      - Integrating FreeRTOS-Plus-FAT: integrating-plusfat.md
  - Port a new platform:
      - Porting guide: porting.md
  - Compliance:
      - IEC 62443 guide: iec62443.md
      - CRA guide: cra.md
      - RFC matrix: rfc-compliance.md
      - Threat model: security/threat-model.md
      - At-rest cryptography: security/at-rest-cryptography.md
      - SBOM: security/sbom.md
      - Vulnerability triage: security/triage-runbook.md
      - Release verification: security/release-verification.md
  - API reference:
      # api-reference/index.md is the tab's own first child, so navigation.indexes
      # promotes it into the tab link — and the narrow-width drawer opens on this
      # landing at the tab level, where Core / Platforms / Roles are its siblings.
      # Nesting it inside a same-named section (as before) made the drawer open one
      # level deeper, hiding those doorways behind the back arrow.
      - api-reference/index.md
      # The raw Doxygen indexes as one peer section beside Core / Platforms / Roles;
      # labelled distinctly (not "API reference") so it doesn't shadow the tab name.
      - Headers and Symbols:
          - Headers: api/files.md
          - Data structures: api/annotated.md
          - Functions: api/functions.md
          - Macros: api/macros.md
      # A section (not a bare page) so Material gives it md-nav__item--section and
      # it reads with the same weight as Platforms / Roles. Its index is its only
      # child — navigation.indexes promotes it into the section link.
      - Core:
          - core/index.md
      - Platforms:
          - platforms/index.md
          - Posix: platforms/posix.md
          - Windows: platforms/windows.md
          - FreeRTOS: platforms/freertos.md
          - FreeRTOS-Plus-TCP: platforms/plustcp.md
          - lwIP (Raw API): platforms/lwip.md
          - OpenSSL: platforms/openssl.md
          - Mbed TLS: platforms/mbedtls.md
          - FatFs: platforms/fatfs.md
          - FreeRTOS-Plus-FAT: platforms/plusfat.md
          - C11 atomics: platforms/atomics.md
      # A role *is* its vtable, so each entry links straight to the generated
      # contract page; detail belongs in the SolidSyslog<Role>Definition.h
      # doc comment, not a hand-maintained copy here.
      - Roles:
          - roles/index.md
          - Resolver: api/structSolidSyslogResolver.md
          - Datagram: api/structSolidSyslogDatagram.md
          - Stream: api/structSolidSyslogStream.md
          - Sender: api/structSolidSyslogSender.md
          - Buffer: api/structSolidSyslogBuffer.md
          - Store: api/structSolidSyslogStore.md
          - BlockDevice: api/structSolidSyslogBlockDevice.md
          - File: api/structSolidSyslogFile.md
          - Mutex: api/structSolidSyslogMutex.md
          - AtomicCounter: api/structSolidSyslogAtomicCounter.md
          - StructuredData: api/structSolidSyslogStructuredData.md
          - SecurityPolicy: api/structSolidSyslogSecurityPolicy.md
  - Maintaining:
      - Building & testing: builds.md
      - Local checks: local-checks.md
      - BDD testing: bdd.md
      - CI pipeline: ci.md
      - Container images: containers.md
      - Naming conventions: NAMING.md
      - MISRA deviations: misra-deviations.md
      - Release process: release-process.md
