services:
  syslog-ng-linux:
    image: balabit/syslog-ng:4.8.2
    volumes:
      - ../Bdd/syslog-ng/syslog-ng.conf:/etc/syslog-ng/syslog-ng.conf
      - ../Bdd/syslog-ng/tls:/etc/syslog-ng/tls:ro
      - bdd-output-linux:/var/log/syslog-ng
      - syslog-ng-ctl-linux:/var/lib/syslog-ng
    entrypoint: ["bash", "-c"]
    command:
      - |
        syslog-ng -F &
        pid=$$!
        deadline=$$((SECONDS + 30))
        while [ ! -S /var/lib/syslog-ng/syslog-ng.ctl ]; do
          kill -0 "$$pid" 2>/dev/null || { echo "syslog-ng exited unexpectedly"; exit 1; }
          [ "$$SECONDS" -ge "$$deadline" ] && { echo "Timed out waiting for syslog-ng control socket"; kill "$$pid" 2>/dev/null; exit 1; }
          sleep 0.1
        done
        chmod 0777 /var/lib/syslog-ng/syslog-ng.ctl
        wait
    networks:
      linux:
        aliases:
          - syslog-ng
    healthcheck:
      test: ["CMD-SHELL", "test -S /var/lib/syslog-ng/syslog-ng.ctl"]
      interval: 2s
      timeout: 5s
      retries: 10

  behave-linux:
    image: ghcr.io/davidcozens/behave:sha-3faff14
    user: "0"
    volumes:
      - ..:/workspaces/SolidSyslog
      - bdd-output-linux:/workspaces/SolidSyslog/Bdd/output
      - syslog-ng-ctl-linux:/var/lib/syslog-ng
    working_dir: /workspaces/SolidSyslog
    networks:
      - linux
    depends_on:
      syslog-ng-linux:
        condition: service_healthy
    environment:
      - BDD_TARGET=linux
    command: behave --junit --junit-directory Bdd/junit --tags='not @wip and not @no_rtc' Bdd/features/

  # Each BDD target pairs with its own syslog-ng instance on its own
  # bridge network so the `syslog-ng` DNS alias is scoped per-pair —
  # if both pairs ever run together (today they don't, by design),
  # neither side accidentally resolves the other's oracle. The
  # behave-<target> service shares the syslog-ng-<target> network
  # namespace via network_mode so QEMU's slirp gateway 10.0.2.2 NATs
  # to the pair's loopback, where syslog-ng-<target> is listening on
  # 0.0.0.0:5514. Adding more targets is one more pair + one more
  # network block.
  syslog-ng-freertos:
    image: balabit/syslog-ng:4.8.2
    volumes:
      - ../Bdd/syslog-ng/syslog-ng.conf:/etc/syslog-ng/syslog-ng.conf
      - ../Bdd/syslog-ng/tls:/etc/syslog-ng/tls:ro
      - bdd-output-freertos:/var/log/syslog-ng
      - syslog-ng-ctl-freertos:/var/lib/syslog-ng
    entrypoint: ["bash", "-c"]
    command:
      - |
        syslog-ng -F &
        pid=$$!
        deadline=$$((SECONDS + 30))
        while [ ! -S /var/lib/syslog-ng/syslog-ng.ctl ]; do
          kill -0 "$$pid" 2>/dev/null || { echo "syslog-ng exited unexpectedly"; exit 1; }
          [ "$$SECONDS" -ge "$$deadline" ] && { echo "Timed out waiting for syslog-ng control socket"; kill "$$pid" 2>/dev/null; exit 1; }
          sleep 0.1
        done
        chmod 0777 /var/lib/syslog-ng/syslog-ng.ctl
        wait
    networks:
      freertos:
        aliases:
          - syslog-ng
    healthcheck:
      test: ["CMD-SHELL", "test -S /var/lib/syslog-ng/syslog-ng.ctl"]
      interval: 2s
      timeout: 5s
      retries: 10

  behave-freertos:
    # Cross image carries qemu-system-arm + python3 + behave.
    image: ghcr.io/davidcozens/cpputest-freertos-cross:sha-10a14ae
    user: "0"
    volumes:
      - ..:/workspaces/SolidSyslog
      - bdd-output-freertos:/workspaces/SolidSyslog/Bdd/output
      - syslog-ng-ctl-freertos:/var/lib/syslog-ng
    working_dir: /workspaces/SolidSyslog
    network_mode: service:syslog-ng-freertos
    depends_on:
      syslog-ng-freertos:
        condition: service_healthy
    environment:
      - BDD_TARGET=freertos
      - EXAMPLE_BINARY=build/freertos-cross/Bdd/Targets/FreeRtos/SolidSyslogBddTarget.elf
    # S08.09 admits @tcp scenarios so tcp_transport.feature runs alongside the
    # existing @udp ones; @buffered excludes store-and-forward features that
    # need a file-backed store (no FreeRTOS file abstraction yet), and
    # @windows_wip excludes the Windows-only TCP singletask variant.
    command: behave --junit --junit-directory Bdd/junit --tags='not @wip and not @freertoswip and not @rtc and not @buffered and not @windows_wip and (@udp or @tcp)' Bdd/features/

volumes:
  bdd-output-linux:
  bdd-output-freertos:
  syslog-ng-ctl-linux:
  syslog-ng-ctl-freertos:

networks:
  linux:
  freertos:
