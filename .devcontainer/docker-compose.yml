services:
  gcc:
    image: ghcr.io/davidcozens/cpputest:sha-18f19e1
    volumes:
      - ..:/workspaces/SolidSyslog:cached
      - ${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent
      - ${HOME:-/tmp}/.claude:/home/developer/.claude
      - ${HOME:-/tmp}/.config/gh:/home/developer/.config/gh
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
      - BUILD_PRESET=debug
    user: developer
    working_dir: /workspaces/SolidSyslog
    command: sleep infinity
    depends_on:
      - syslog-ng

  syslog-ng:
    image: balabit/syslog-ng:latest
    volumes:
      - ../Bdd/syslog-ng/syslog-ng.conf:/etc/syslog-ng/syslog-ng.conf
      - ../Bdd/syslog-ng/tls:/etc/syslog-ng/tls:ro
      - ../Bdd/output:/var/log/syslog-ng
      - syslog-ng-ctl:/var/lib/syslog-ng
    ports:
      - "5514:5514/udp"
      - "5514:5514/tcp"
      - "6514:6514/tcp"
      - "6515:6515/tcp"
    working_dir: /workspaces/SolidSyslog
    entrypoint: ["bash", "-c"]
    command:
      - |
        syslog-ng -F &
        pid=$$!
        deadline=$$((SECONDS + 30))
        while [ ! -S /var/lib/syslog-ng/syslog-ng.ctl ]; do
          kill -0 "$$pid" 2>/dev/null || { echo "syslog-ng exited unexpectedly"; exit 1; }
          [ "$$SECONDS" -ge "$$deadline" ] && { echo "Timed out waiting for syslog-ng control socket"; kill "$$pid" 2>/dev/null; exit 1; }
          sleep 0.1
        done
        chmod 0777 /var/lib/syslog-ng/syslog-ng.ctl
        wait

  behave:
    image: ghcr.io/davidcozens/behave:sha-3faff14
    volumes:
      - ..:/workspaces/SolidSyslog:cached
      - ../Bdd/output:/workspaces/SolidSyslog/Bdd/output
      - syslog-ng-ctl:/var/lib/syslog-ng
      - ${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent
      - ${HOME:-/tmp}/.claude:/home/developer/.claude
      - ${HOME:-/tmp}/.config/gh:/home/developer/.config/gh
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
    user: developer
    working_dir: /workspaces/SolidSyslog
    depends_on:
      - syslog-ng
    command: sleep infinity

  clang:
    image: ghcr.io/davidcozens/cpputest-clang:sha-7eac3ab
    volumes:
      - ..:/workspaces/SolidSyslog:cached
      - ${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent
      - ${HOME:-/tmp}/.claude:/home/developer/.claude
      - ${HOME:-/tmp}/.config/gh:/home/developer/.config/gh
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
      - BUILD_PRESET=clang-debug
    user: developer
    working_dir: /workspaces/SolidSyslog
    command: sleep infinity

volumes:
  syslog-ng-ctl:
